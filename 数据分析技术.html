            --dark-color: #1e293b;

        .nav-logo {
            font-family: 'Playfair Display', serif;

        .back-link {

        .back-link:hover {

            color: white;
            transform: translateX(-5px);
        }

        .hero {

            color: white;
            padding: 4rem 0;

        }

        .hero p {

        .chapter-buttons {

            gap: 0.75rem;
            justify-content: center;
        }

        .chapter-btn {
            padding: 0.5rem 1rem;
            border: 2px solid #e2e8f0;
            background-color: white;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .chapter-btn:hover {
            border-color: var(--primary-color);
            background-color: #eff6ff;
        }

        .chapter-btn.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .chapter-btn.completed {
            border-color: var(--success-color);
            background-color: #d1fae5;
            color: #065f46;
        }

        .progress-section {
            background-color: white;
            padding: 2rem 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .progress-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .progress-title {
            font-weight: 600;
            color: var(--dark-color);
        }

        .progress-percentage {
            font-weight: 600;
            color: var(--primary-color);
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background-color: #e2e8f0;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 5px;
            transition: width 0.5s ease;
        }

        .learning-section {
            padding: 4rem 0;
            background-color: white;
        }

        .section-title {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 3rem;
            color: var(--dark-color);
        }

        .chapter-title {
            font-size: 1.75rem;
            color: var(--primary-color);
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 3px solid var(--primary-color);
        }

        .learning-content h4 {
            color: var(--dark-color);
            margin-top: 1.5rem;
            margin-bottom: 1rem;
        }

        .learning-content p {
            color: var(--gray-color);
            margin-bottom: 1rem;
            text-align: justify;
        }

        .learning-content ul, .learning-content ol {
            margin-left: 2rem;
            margin-bottom: 1.5rem;
            color: var(--gray-color);
        }

        .learning-content li {
            margin-bottom: 0.5rem;
        }

        .code-block {
            background-color: #1e293b;
            color: #e2e8f0;
            padding: 1.5rem;
            border-radius: var(--border-radius);
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            overflow-x: auto;
        }

        .highlight-box {
            background-color: #eff6ff;
            border-left: 4px solid var(--primary-color);
            padding: 1.5rem;
            margin: 1.5rem 0;
            border-radius: 0 var(--border-radius) var(--border-radius) 0;
        }

        .highlight-box h4 {
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .highlight-box p {
            color: var(--dark-color);
            margin-bottom: 0;
        }

        .complete-btn {
            display: inline-block;
            background-color: var(--success-color);
            color: white;
            padding: 0.75rem 2rem;
            border-radius: var(--border-radius);
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            font-size: 1rem;

        .complete-btn:hover {
            background-color: #059669;

            padding: 4rem 0;
            background-color: #f1f5f9;
            display: none;
        }

        .quiz-section.active {
            display: block;
        }

        .quiz-container {
            background-color: white;
            border-radius: var(--border-radius);
            padding: 3rem;
            box-shadow: var(--shadow);
            max-width: 800px;
            margin: 0 auto;
        }

        .quiz-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .quiz-header h2 {
            color: var(--dark-color);
            margin-bottom: 0.5rem;
        }

        .quiz-header p {
            color: var(--gray-color);
        }

        .question-container {
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .question-container:last-child {
            border-bottom: none;
        }

        .question-number {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: var(--border-radius);
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .question-text {
            font-size: 1.1rem;
            color: var(--dark-color);
            margin-bottom: 1.5rem;
            font-weight: 500;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .option {
            display: flex;
            align-items: center;
            padding: 1rem;
            background-color: var(--light-color);
            border: 2px solid #e2e8f0;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option:hover {
            border-color: var(--primary-color);
            background-color: #eff6ff;
        }

        .option.selected {
            border-color: var(--primary-color);
            background-color: #dbeafe;
        }

        .option.correct {
            border-color: var(--success-color);
            background-color: #d1fae5;
        }

        .option.incorrect {
            border-color: var(--error-color);
            background-color: #fee2e2;
        }

        .option-radio {
            width: 20px;
            height: 20px;
            border: 2px solid var(--primary-color);
            border-radius: 50%;
            margin-right: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .option.selected .option-radio::after {
            content: '';
            width: 10px;
            height: 10px;
            background-color: var(--primary-color);
            border-radius: 50%;
        }

        .option.correct .option-radio {
            border-color: var(--success-color);
        }

        .option.correct .option-radio::after {
            background-color: var(--success-color);
        }

        .option.incorrect .option-radio {
            border-color: var(--error-color);
        }

        .option.incorrect .option-radio::after {
            background-color: var(--error-color);
        }

        .explanation {
            margin-top: 1rem;
            padding: 1rem;
            background-color: #fef3c7;
            border-radius: var(--border-radius);
            border-left: 4px solid var(--accent-color);
            display: none;
        }

        .explanation.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .explanation h5 {
            color: #92400e;
            margin-bottom: 0.5rem;
        }

        .explanation p {
            color: #78350f;
            font-size: 0.95rem;
            margin-bottom: 0;
        }

        .submit-quiz-btn {
            display: block;
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            padding: 1rem;
            border-radius: var(--border-radius);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            margin-top: 2rem;
        }

        .submit-quiz-btn:hover {
            background-color: #2563eb;
        }

        .submit-quiz-btn:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }

        .results-container {
            text-align: center;
            padding: 2rem;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
        }

        .score-text {
            color: white;
            font-size: 2.5rem;
            font-weight: 700;
        }

        .score-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .result-message {
            font-size: 1.5rem;
            color: var(--dark-color);
            margin-bottom: 1rem;
        }

        .result-details {
            color: var(--gray-color);
            margin-bottom: 2rem;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .retry-btn, .next-chapter-btn {
            display: inline-block;
            padding: 1rem 2rem;
            border-radius: var(--border-radius);
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
        }

        .retry-btn {
            background-color: var(--primary-color);
            color: white;
        }

        .retry-btn:hover {
            background-color: #2563eb;
        }

        .next-chapter-btn {
            background-color: var(--success-color);
            color: white;
        }

        .next-chapter-btn:hover {
            background-color: #059669;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }

            .quiz-container {
                padding: 1.5rem;
            }
        }
    </style>
</head>

    <script>
        const chapters = [
            {
                id: 1,
                title: "第1章：数据分析概述",
                content: `
                    <div class="learning-content">
                        <h4>1.1 什么是数据分析</h4>
                        <p>数据分析是指用适当的统计分析方法对收集来的大量数据进行分析，将它们加以汇总和理解并消化，以求最大化地开发数据的功能，发挥数据的作用。数据分析是为了提取有用信息和形成结论，而对数据加以详细研究和概括总结的过程。</p>
                        
                        <p>在当今数据驱动的时代，数据分析已经成为企业决策、科研探索、产品优化等领域不可或缺的核心能力。通过数据分析，我们可以发现隐藏的规律、预测未来趋势、优化业务流程、降低风险、提升效率。</p>

                        <h4>1.2 数据分析的重要性</h4>
                        <ul>
                            <li><strong>帮助企业做出科学的决策</strong> - 基于数据而非直觉进行决策</li>
                            <li><strong>发现业务问题和机会</strong> - 通过数据分析识别潜在问题</li>
                            <li><strong>优化运营效率和成本</strong> - 分析流程数据，找出瓶颈</li>
                            <li><strong>预测未来趋势和发展</strong> - 通过历史数据预测未来</li>
                            <li><strong>提升客户满意度</strong> - 分析客户行为，提供精准服务</li>
                        </ul>

                        <h4>1.3 数据分析的完整流程</h4>
                        <ol>
                            <li><strong>需求分析</strong> - 明确分析目的和要解决的问题</li>
                            <li><strong>数据收集</strong> - 获取相关的数据来源</li>
                            <li><strong>数据清洗</strong> - 处理缺失值、异常值等问题</li>
                            <li><strong>数据探索</strong> - 对数据进行初步探索</li>
                            <li><strong>数据分析</strong> - 运用统计方法进行深入分析</li>
                            <li><strong>数据可视化</strong> - 将结果以图表形式展示</li>
                            <li><strong>报告撰写</strong> - 总结分析结论和建议</li>
                        </ol>

                        <div class="highlight-box">

                            <p>数据分析的核心不是复杂的数学公式，而是如何将数据转化为可行动的洞察。好的数据分析应该回答具体的业务问题。</p>
                        </div>
                    </div>
                `,
                quiz: [
                    { question: "数据分析的主要目的是什么？", options: ["制作漂亮的图表", "将数据转化为可行动的洞察", "收集尽可能多的数据", "使用复杂的数学公式"], correct: 1, explanation: "数据分析的核心目的是将数据转化为可行动的洞察，帮助做出更好的决策。" },
                    { question: "数据分析流程的第一步是什么？", options: ["数据清洗", "数据收集", "需求分析", "数据可视化"], correct: 2, explanation: "数据分析流程的第一步是需求分析，明确分析目的和要解决的问题。" },
                    { question: "以下哪项不是数据分析的重要性体现？", options: ["帮助做出科学决策", "发现业务机会", "完全替代人工判断", "预测未来趋势"], correct: 2, explanation: "数据分析可以辅助决策，但不能完全替代人工判断。" },

                    { question: "数据分析为什么重要？", options: ["让报告看起来专业", "帮助做出更好的决策", "消耗大量数据", "使用各种工具"], correct: 1, explanation: "数据分析最重要的作用是帮助做出更好的决策。" }

            {
                id: 2,
                title: "第2章：数据类型与数据来源",
                content: `
                    <div class="learning-content">
                        <h4>2.1 数据的基本类型</h4>
                        <p>在数据分析中，我们通常将数据分为以下几种类型，不同类型的数据需要不同的处理方法。</p>
                        
                        <h4>结构化数据</h4>
                        <p>结构化数据是指可以用表格形式表示的数据，具有固定的格式和结构。</p>
                        <ul>
                            <li>特点：组织严密、易于查询、便于统计分析</li>
                            <li>例子：学生成绩表、销售订单、用户信息表</li>
                        </ul>

                        <h4>半结构化数据</h4>
                        <p>半结构化数据具有一定的组织结构，但不完全符合关系型数据库的表格形式。</p>
                        <ul>
                            <li>特点：灵活、可扩展、适合层次化数据</li>
                            <li>例子：JSON、XML、日志文件</li>
                        </ul>

                        <h4>非结构化数据</h4>
                        <p>非结构化数据没有固定的格式和结构，通常需要特殊的处理方法。</p>
                        <ul>

                    { question: "好的报告建议应该是？", options: ["空泛的", "可执行的", "复杂的", "不需要依据的"], correct: 1, explanation: "好的建议应该是具体、可执行的。" },
                    { question: "以下哪个不是报告撰写的原则？", options: ["以受众为中心", "结论先行", "用数据说话", "越复杂越好"], correct: 3, explanation: "报告应该简洁清晰，不是越复杂越好。" },
                    { question: "报告摘要应该放在？", options: ["最前面", "中间", "最后面", "无所谓"], correct: 0, explanation: "摘要应该放在最前面，让读者快速了解核心内容。" },
                    { question: "报告中的数据来源说明是为了？", options: ["增加篇幅", "体现分析的可信度", "展示技术能力", "没什么用"], correct: 1, explanation: "说明数据来源可以体现分析的可信度和透明度。" },
                    { question: "好的报告应该避免？", options: ["用数据说话", "主观臆断", "提供建议", "简洁明了"], correct: 1, explanation: "报告应该用数据说话，避免主观臆断。" },
                    { question: "报告的附录通常包含？", options: ["核心结论", "详细数据和补充材料", "建议", "摘要"], correct: 1, explanation: "附录通常包含详细数据和补充材料，供需要深入了解的读者参考。" },
                    { question: "读者看完报告后应该知道的不包括？", options: ["发生了什么", "为什么发生", "怎么做饭", "应该怎么做"], correct: 2, explanation: "报告应该回答发生了什么、为什么发生、应该怎么做。" }
                ]
            }
        ];

        let currentChapterIndex = 0;
        let completedChapters = new Set();
        let selectedAnswers = {};

        function init() {
            loadProgress();
            renderChapterNav();
            loadChapter(0);
        }

        function loadProgress() {
            const saved = localStorage.getItem('dataAnalysisChapters');
            if (saved) {
                completedChapters = new Set(JSON.parse(saved));
            }
        }

        function saveProgress() {
            localStorage.setItem('dataAnalysisChapters', JSON.stringify([...completedChapters]));
        }

        function updateProgress() {
            const percentage = Math.round((completedChapters.size / chapters.length) * 100);
            document.getElementById('progressPercentage').textContent = percentage + '%';
            document.getElementById('progressFill').style.width = percentage + '%';
        }

        function renderChapterNav() {
            const nav = document.getElementById('chapterNav');
            nav.innerHTML = '';
            
            chapters.forEach((chapter, index) => {
                const btn = document.createElement('button');
                btn.className = 'chapter-btn';
                if (index === currentChapterIndex) btn.classList.add('active');
                if (completedChapters.has(chapter.id)) btn.classList.add('completed');
                btn.textContent = chapter.title;
                btn.onclick = () => loadChapter(index);
                nav.appendChild(btn);
            });
        }

        function loadChapter(index) {
            currentChapterIndex = index;
            const chapter = chapters[index];
            
            document.getElementById('chapterTitle').textContent = chapter.title;
            document.getElementById('learningContent').innerHTML = chapter.content;
            
            document.getElementById('quizSection').classList.remove('active');
            
            renderChapterNav();
            updateProgress();
        }

        function completeChapter() {
            const chapter = chapters[currentChapterIndex];
            if (!completedChapters.has(chapter.id)) {
                completedChapters.add(chapter.id);
                saveProgress();
                renderChapterNav();
                updateProgress();
                alert('恭喜完成本章学习！现在可以进行测试了。');
            } else {
                alert('本章已经完成了！');
            }
        }

        function startQuiz() {
            const chapter = chapters[currentChapterIndex];
            
            if (!completedChapters.has(chapter.id)) {
                alert('请先完成本章学习！');
                return;
            }

            selectedAnswers = {};
            
            document.querySelector('.quiz-header h2').textContent = '📝 ' + chapter.title + ' 测试';
            document.getElementById('quizSection').classList.add('active');
            
            renderQuiz(chapter);
            document.getElementById('quizSection').scrollIntoView({ behavior: 'smooth' });
        }

        function renderQuiz(chapter) {
            const quizContent = document.getElementById('quizContent');
            quizContent.innerHTML = '';
            
            chapter.quiz.forEach((q, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-container fade-in';
                questionDiv.style.animationDelay = (index * 0.1) + 's';
                
                questionDiv.innerHTML = `
                    <span class="question-number">第 ${index + 1} 题</span>
                    <p class="question-text">${q.question}</p>
                    <div class="options">
                        ${q.options.map((opt, optIndex) => `
                            <div class="option" data-question="${index}" data-option="${optIndex}" onclick="selectOption(${index}, ${optIndex})">
                                <div class="option-radio"></div>
                                <span>${opt}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="explanation" id="explanation-${index}">
                        <h5>📚 解析</h5>
                        <p>${q.explanation}</p>
                    </div>
                `;
                
                quizContent.appendChild(questionDiv);
            });
            
            document.getElementById('submitQuizBtn').style.display = 'block';
        }

        function selectOption(questionIndex, optionIndex) {
            selectedAnswers[questionIndex] = optionIndex;
            
            const questionDiv = document.querySelectorAll('.question-container')[questionIndex];
            const options = questionDiv.querySelectorAll('.option');
            
            options.forEach((opt, idx) => {
                opt.classList.remove('selected');
                if (idx === optionIndex) {
                    opt.classList.add('selected');
                }
            });
        }

        function submitQuiz() {
            const chapter = chapters[currentChapterIndex];
            
            if (Object.keys(selectedAnswers).length < chapter.quiz.length) {
                alert('请完成所有题目后再提交！');
                return;
            }

            let correctCount = 0;
            
            chapter.quiz.forEach((q, index) => {
                const questionDiv = document.querySelectorAll('.question-container')[index];
                const options = questionDiv.querySelectorAll('.option');
                
                options.forEach((opt, optIndex) => {
                    opt.style.pointerEvents = 'none';
                    
                    if (optIndex === q.correct) {
                        opt.classList.add('correct');
                    } else if (selectedAnswers[index] === optIndex) {
                        opt.classList.add('incorrect');
                    }
                });
                
                document.getElementById(`explanation-${index}`).classList.add('show');
                
                if (selectedAnswers[index] === q.correct) {
                    correctCount++;
                }
            });

            const score = Math.round((correctCount / chapter.quiz.length) * 100);
            
            setTimeout(() => {
                showResults(score, correctCount, chapter.quiz.length);
            }, 500);
        }

        function showResults(score, correctCount, total) {
            const quizContent = document.getElementById('quizContent');
            const submitBtn = document.getElementById('submitQuizBtn');
            
            let message = '';
            if (score >= 90) {
                message = '🎉 优秀！你掌握得非常好！';
            } else if (score >= 70) {
                message = '👍 良好！建议回顾一下答错的题目。';
            } else if (score >= 60) {
                message = '💪 合格！建议重新学习本章内容。';
            } else {
                message = '📚 需要继续努力！建议重新学习后再测试。';
            }

            quizContent.innerHTML = `
                <div class="results-container fade-in">
                    <div class="score-circle">
                        <div>
                            <div class="score-text">${score}</div>
                            <div class="score-label">分</div>
                        </div>
                    </div>
                    <h2 class="result-message">${message}</h2>
                    <p class="result-details">正确 ${correctCount} 题，共 ${total} 题</p>
                    <div class="action-buttons">
                        <button class="retry-btn" onclick="retryQuiz()">重新测试</button>
                        <button class="next-chapter-btn" onclick="nextChapter()">下一章</button>
                    </div>
                </div>
            `;
            
            submitBtn.style.display = 'none';
        }

        function retryQuiz() {
            selectedAnswers = {};
            const chapter = chapters[currentChapterIndex];
            renderQuiz(chapter);
        }

        function nextChapter() {
            if (currentChapterIndex < chapters.length - 1) {
                loadChapter(currentChapterIndex + 1);
            } else {
                alert('恭喜你完成了所有章节的学习！');
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
