<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据分析技术</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #3b82f6;
            --secondary-color: #10b981;
            --accent-color: #f59e0b;
            --dark-color: #1e293b;
            --light-color: #f8fafc;
            --gray-color: #64748b;
            --success-color: #10b981;
            --error-color: #ef4444;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --border-radius: 0.5rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.8;
            color: var(--dark-color);
            background-color: var(--light-color);
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 1rem;
        }

        a {
            color: var(--primary-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--secondary-color);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        nav {
            background-color: white;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem 1.5rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        .nav-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .hero {
            background: linear-gradient(135deg, var(--primary-color), #60a5fa);
            color: white;
            padding: 4rem 0;
            text-align: center;
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .hero p {
            font-size: 1.1rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }

        .chapter-nav {
            background-color: white;
            padding: 1.5rem 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .chapter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
        }

        .chapter-btn {
            padding: 0.5rem 1rem;
            border: 2px solid #e2e8f0;
            background-color: white;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .chapter-btn:hover {
            border-color: var(--primary-color);
            background-color: #eff6ff;
        }

        .chapter-btn.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .chapter-btn.completed {
            border-color: var(--success-color);
            background-color: #d1fae5;
            color: #065f46;
        }

        .progress-section {
            background-color: white;
            padding: 2rem 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .progress-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .progress-title {
            font-weight: 600;
            color: var(--dark-color);
        }

        .progress-percentage {
            font-weight: 600;
            color: var(--primary-color);
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background-color: #e2e8f0;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 5px;
            transition: width 0.5s ease;
        }

        .learning-section {
            padding: 4rem 0;
        }

        .chapter-title {
            font-size: 2rem;
            color: var(--dark-color);
            margin-bottom: 2rem;
            text-align: center;
        }

        .learning-content {
            background-color: white;
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
        }

        .learning-content h4 {
            color: var(--primary-color);
            font-size: 1.25rem;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
        }

        .learning-content h4:first-child {
            margin-top: 0;
        }

        .learning-content p {
            margin-bottom: 1rem;
            color: var(--gray-color);
        }

        .learning-content ul, .learning-content ol {
            margin-bottom: 1rem;
            padding-left: 1.5rem;
            color: var(--gray-color);
        }

        .learning-content li {
            margin-bottom: 0.5rem;
        }

        .highlight-box {
            background: linear-gradient(135deg, #eff6ff, #dbeafe);
            border-left: 4px solid var(--primary-color);
            padding: 1.5rem;
            margin: 1.5rem 0;
            border-radius: 0 var(--border-radius) var(--border-radius) 0;
        }

        .highlight-box h4 {
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .highlight-box p {
            color: var(--dark-color);
            margin-bottom: 0;
        }

        .code-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        .code-editor {
            background-color: #1e293b;
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            background-color: #334155;
            border-bottom: 1px solid #475569;
        }

        .code-language {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .code-actions {
            display: flex;
            gap: 0.5rem;
        }

        .code-action-btn {
            padding: 0.25rem 0.75rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background-color 0.3s ease;
        }

        .code-action-btn:hover {
            background-color: #2563eb;
        }

        .code-action-btn.run {
            background-color: var(--success-color);
        }

        .code-action-btn.run:hover {
            background-color: #059669;
        }

        .code-action-btn.reset {
            background-color: #64748b;
        }

        .code-action-btn.reset:hover {
            background-color: #475569;
        }

        textarea.code-input {
            width: 100%;
            height: 250px;
            padding: 1rem;
            background-color: #1e293b;
            color: #e2e8f0;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            border: none;
            resize: none;
            line-height: 1.5;
        }

        textarea.code-input:focus {
            outline: none;
        }

        .code-output {
            background-color: #0f172a;
            padding: 1rem;
            min-height: 100px;
            max-height: 200px;
            overflow-y: auto;
        }

        .code-output pre {
            color: #e2e8f0;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .code-output .error {
            color: #ef4444;
        }

        .code-output .success {
            color: #10b981;
        }

        .code-output .info {
            color: #3b82f6;
        }

        .learning-content .code-block {
            background-color: #1e293b;
            color: #e2e8f0;
            padding: 1.5rem;
            border-radius: var(--border-radius);
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            overflow-x: auto;
            position: relative;
        }

        .learning-content .code-block .copy-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            padding: 0.25rem 0.5rem;
            background-color: #334155;
            color: #e2e8f0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .learning-content .code-block:hover .copy-btn {
            opacity: 1;
        }

        .learning-content .code-block .copy-btn:hover {
            background-color: #475569;
        }

        .complete-btn {
            display: inline-block;
            background-color: var(--success-color);
            color: white;
            padding: 0.75rem 2rem;
            border-radius: var(--border-radius);
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .complete-btn:hover {
            background-color: #059669;
        }

        .quiz-section {
            background-color: #f1f5f9;
            padding: 4rem 0;
            display: none;
        }

        .quiz-section.active {
            display: block;
        }

        .quiz-container {
            background-color: white;
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            max-width: 800px;
            margin: 0 auto;
        }

        .quiz-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .quiz-header h2 {
            color: var(--dark-color);
            font-size: 1.75rem;
        }

        .quiz-header p {
            color: var(--gray-color);
        }

        .question-container {
            background-color: #f8fafc;
            padding: 1.5rem;
            border-radius: var(--border-radius);
            margin-bottom: 1.5rem;
            opacity: 0;
        }

        .question-number {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 50%;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .question-text {
            font-weight: 500;
            margin-bottom: 1rem;
            color: var(--dark-color);
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .option {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            background-color: white;
            border: 2px solid #e2e8f0;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option:hover:not(.answered) {
            border-color: var(--primary-color);
            background-color: #eff6ff;
        }

        .option.answered {
            cursor: default;
        }

        .option.selected {
            border-color: var(--primary-color);
            background-color: #eff6ff;
        }

        .option.correct {
            border-color: var(--success-color);
            background-color: #d1fae5;
        }

        .option.incorrect {
            border-color: var(--error-color);
            background-color: #fee2e2;
        }

        .option-radio {
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid #cbd5e1;
            border-radius: 50%;
            margin-right: 1rem;
            transition: all 0.3s ease;
            position: relative;
        }

        .option.selected .option-radio {
            border-color: var(--primary-color);
            background-color: var(--primary-color);
        }

        .option.selected .option-radio::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 0.5rem;
            height: 0.5rem;
            background-color: white;
            border-radius: 50%;
        }

        .option.correct .option-radio {
            border-color: var(--success-color);
            background-color: var(--success-color);
        }

        .option.correct .option-radio::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 0.5rem;
            height: 0.5rem;
            background-color: white;
            border-radius: 50%;
        }

        .option.incorrect .option-radio {
            border-color: var(--error-color);
            background-color: var(--error-color);
        }

        .option.incorrect .option-radio::after {
            content: '✗';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .explanation {
            margin-top: 1rem;
            padding: 1rem;
            background-color: #fffbeb;
            border-radius: var(--border-radius);
            display: none;
        }

        .explanation.show {
            display: block;
        }

        .explanation h5 {
            color: #92400e;
            margin-bottom: 0.5rem;
        }

        .explanation p {
            color: #78350f;
            font-size: 0.95rem;
        }

        .submit-quiz-btn {
            display: block;
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            padding: 1rem;
            border-radius: var(--border-radius);
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            font-size: 1rem;
            margin-top: 2rem;
        }

        .submit-quiz-btn:hover {
            background-color: #2563eb;
        }

        .submit-quiz-btn:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }

        .finish-quiz-btn {
            display: inline-block;
            padding: 1rem 2rem;
            border-radius: var(--border-radius);
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            font-size: 1rem;
            background-color: var(--primary-color);
            color: white;
        }

        .finish-quiz-btn:hover:not(:disabled) {
            background-color: #2563eb;
        }

        .finish-quiz-btn:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }

        .view-wrong-btn {
            display: inline-block;
            padding: 1rem 2rem;
            border-radius: var(--border-radius);
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            font-size: 1rem;
            background-color: var(--accent-color);
            color: white;
        }

        .view-wrong-btn:hover {
            background-color: #d97706;
        }

        .results-container {
            text-align: center;
            padding: 2rem;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
        }

        .score-text {
            color: white;
            font-size: 2.5rem;
            font-weight: 700;
        }

        .score-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .result-message {
            font-size: 1.5rem;
            color: var(--dark-color);
            margin-bottom: 1rem;
        }

        .result-details {
            color: var(--gray-color);
            margin-bottom: 2rem;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .retry-btn, .next-chapter-btn {
            display: inline-block;
            padding: 1rem 2rem;
            border-radius: var(--border-radius);
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
        }

        .retry-btn {
            background-color: var(--primary-color);
            color: white;
        }

        .retry-btn:hover {
            background-color: #2563eb;
        }

        .next-chapter-btn {
            background-color: var(--success-color);
            color: white;
        }

        .next-chapter-btn:hover {
            background-color: #059669;
        }

        .wrong-answers-container {
            text-align: left;
            margin-top: 2rem;
        }

        .wrong-answers-container h3 {
            color: var(--error-color);
            margin-bottom: 1rem;
            text-align: center;
        }

        .wrong-question {
            background-color: #fef2f2;
            border-radius: var(--border-radius);
            padding: 1.5rem;
            margin-bottom: 1rem;
            border-left: 4px solid var(--error-color);
        }

        .wrong-question .question-text {
            margin-bottom: 1rem;
            font-size: 1rem;
        }

        .wrong-question .your-answer {
            color: var(--error-color);
            margin-bottom: 0.5rem;
        }

        .wrong-question .correct-answer {
            color: var(--success-color);
            margin-bottom: 1rem;
        }

        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }

            .quiz-container {
                padding: 1.5rem;
            }

            .code-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="nav-logo">📊 数据分析技术</div>
        </div>
    </nav>

    <section class="hero">
        <div class="container">
            <h1>数据分析技术</h1>
            <p>系统学习数据分析的核心概念、方法和技术，掌握从数据处理到可视化的完整流程</p>
        </div>
    </section>

    <section class="chapter-nav">
        <div class="container">
            <div class="chapter-buttons" id="chapterNav">
            </div>
        </div>
    </section>

    <section class="progress-section">
        <div class="progress-container">
            <div class="progress-header">
                <span class="progress-title">学习进度</span>
                <span class="progress-percentage" id="progressPercentage">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
        </div>
    </section>

    <section class="learning-section">
        <div class="container">
            <h2 class="chapter-title" id="chapterTitle">第1章：数据分析概述</h2>
            
            <div id="learningContent">
            </div>

            <div style="text-align: center; margin-top: 3rem;">
                <button class="complete-btn" onclick="completeChapter()">完成本章学习</button>
            </div>

            <div style="text-align: center; margin-top: 1.5rem;">
                <button class="complete-btn" style="background-color: var(--primary-color);" onclick="startQuiz()">开始本章测试</button>
            </div>
        </div>
    </section>

    <section class="quiz-section" id="quizSection">
        <div class="container">
            <div class="quiz-container">
                <div class="quiz-header">
                    <h2>📝 第X章测试</h2>
                    <p>每道题选择后立即显示解析，全部做完后可查看错题</p>
                </div>
                
                <div id="quizContent"></div>
                
                <div class="action-buttons" id="quizActions">
                    <button class="finish-quiz-btn" id="finishQuizBtn" onclick="finishQuiz()" disabled>完成测试</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        const chapters = [
            {
                id: 1,
                title: "第1章：数据分析概述",
                content: `
                    <div class="learning-content">
                        <h4>1.1 什么是数据分析</h4>
                        <p>数据分析是指用适当的统计分析方法对收集来的大量数据进行分析，将它们加以汇总和理解并消化，以求最大化地开发数据的功能，发挥数据的作用。数据分析是为了提取有用信息和形成结论，而对数据加以详细研究和概括总结的过程。</p>
                        
                        <p>在当今数据驱动的时代，数据分析已经成为企业决策、科研探索、产品优化等领域不可或缺的核心能力。通过数据分析，我们可以发现隐藏的规律、预测未来趋势、优化业务流程、降低风险、提升效率。</p>

                        <h4>1.2 数据分析的重要性</h4>
                        <ul>
                            <li><strong>帮助企业做出科学的决策</strong> - 基于数据而非直觉进行决策</li>
                            <li><strong>发现业务问题和机会</strong> - 通过数据分析识别潜在问题</li>
                            <li><strong>优化运营效率和成本</strong> - 分析流程数据，找出瓶颈</li>
                            <li><strong>预测未来趋势和发展</strong> - 通过历史数据预测未来</li>
                            <li><strong>提升客户满意度</strong> - 分析客户行为，提供精准服务</li>
                        </ul>

                        <h4>1.3 数据分析的完整流程</h4>
                        <ol>
                            <li><strong>需求分析</strong> - 明确分析目的和要解决的问题</li>
                            <li><strong>数据收集</strong> - 获取相关的数据来源</li>
                            <li><strong>数据清洗</strong> - 处理缺失值、异常值等问题</li>
                            <li><strong>数据探索</strong> - 对数据进行初步探索</li>
                            <li><strong>数据分析</strong> - 运用统计方法进行深入分析</li>
                            <li><strong>数据可视化</strong> - 将结果以图表形式展示</li>
                            <li><strong>报告撰写</strong> - 总结分析结论和建议</li>
                        </ol>

                        <div class="highlight-box">

            renderChapterNav();
            loadChapter(0);

        function loadProgress() {
            const saved = localStorage.getItem('dataAnalysisChapters');
            if (saved) {
                completedChapters = new Set(JSON.parse(saved));
            }
        }

        function saveProgress() {
            localStorage.setItem('dataAnalysisChapters', JSON.stringify([...completedChapters]));
        }

        function updateProgress() {
            const percentage = Math.round((completedChapters.size / chapters.length) * 100);
            document.getElementById('progressPercentage').textContent = percentage + '%';
            document.getElementById('progressFill').style.width = percentage + '%';
        }

        function renderChapterNav() {
            const nav = document.getElementById('chapterNav');
            nav.innerHTML = '';
            
            chapters.forEach((chapter, index) => {
                const btn = document.createElement('button');
                btn.className = 'chapter-btn';
                if (index === currentChapterIndex) btn.classList.add('active');
                if (completedChapters.has(chapter.id)) btn.classList.add('completed');
                btn.textContent = chapter.title;
                btn.onclick = () => loadChapter(index);
                nav.appendChild(btn);
            });
        }

        function loadChapter(index) {
            currentChapterIndex = index;
            const chapter = chapters[index];
            
            document.getElementById('chapterTitle').textContent = chapter.title;
            document.getElementById('learningContent').innerHTML = chapter.content;
            
            document.getElementById('quizSection').classList.remove('active');
            
            renderChapterNav();
            updateProgress();
        }

        function completeChapter() {
            const chapter = chapters[currentChapterIndex];
            if (!completedChapters.has(chapter.id)) {
                completedChapters.add(chapter.id);
                saveProgress();
                renderChapterNav();
                updateProgress();
                alert('恭喜完成本章学习！现在可以进行测试了。');
            } else {
                alert('本章已经完成了！');
            }
        }

        function startQuiz() {
            const chapter = chapters[currentChapterIndex];
            
            if (!completedChapters.has(chapter.id)) {
                alert('请先完成本章学习！');
                return;
            }

            selectedAnswers = {};
            answeredQuestions = new Set();
            wrongAnswers = [];
            
            document.querySelector('.quiz-header h2').textContent = '📝 ' + chapter.title + ' 测试';
            document.getElementById('quizSection').classList.add('active');
            
            renderQuiz(chapter);
            document.getElementById('quizSection').scrollIntoView({ behavior: 'smooth' });
        }

        function renderQuiz(chapter, showAll = false) {
            const quizContent = document.getElementById('quizContent');
            quizContent.innerHTML = '';
            
            const questionsToShow = showAll ? chapter.quiz : chapter.quiz;
            
            questionsToShow.forEach((q, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-container fade-in';
                questionDiv.style.animationDelay = (index * 0.1) + 's';
                
                const isAnswered = answeredQuestions.has(index);
                const isCorrect = isAnswered && selectedAnswers[index] === q.correct;
                
                let optionsHtml = q.options.map((opt, optIndex) => {
                    let optionClass = '';
                    if (isAnswered) {
                        if (optIndex === q.correct) {
                            optionClass = ' correct answered';
                        } else if (selectedAnswers[index] === optIndex) {
                            optionClass = ' incorrect answered';
                        } else {
                            optionClass = ' answered';
                        }
                    }
                    return `
                        <div class="option${optionClass}" data-question="${index}" data-option="${optIndex}" onclick="selectOption(${index}, ${optIndex})">
                            <div class="option-radio"></div>
                            <span>${opt}</span>
                        </div>
                    `;
                }).join('');
                
                questionDiv.innerHTML = `
                    <span class="question-number">第 ${index + 1} 题</span>
                    <p class="question-text">${q.question}</p>
                    <div class="options">
                        ${optionsHtml}
                    </div>
                    <div class="explanation ${isAnswered ? 'show' : ''}" id="explanation-${index}">
                        <h5>📚 解析</h5>
                        <p>${q.explanation}</p>
                    </div>
                `;
                
                quizContent.appendChild(questionDiv);
            });
            
            document.getElementById('finishQuizBtn').disabled = answeredQuestions.size < chapter.quiz.length;
            document.getElementById('quizActions').style.display = 'flex';
        }

        function selectOption(questionIndex, optionIndex) {
            const chapter = chapters[currentChapterIndex];
            
            if (answeredQuestions.has(questionIndex)) {
                return;
            }

            selectedAnswers[questionIndex] = optionIndex;
            answeredQuestions.add(questionIndex);

            const questionDiv = document.querySelectorAll('.question-container')[questionIndex];
            const options = questionDiv.querySelectorAll('.option');
            const q = chapter.quiz[questionIndex];

            options.forEach((opt, idx) => {
                opt.classList.add('answered');
                opt.classList.remove('selected');
                if (idx === q.correct) {
                    opt.classList.add('correct');
                } else if (idx === optionIndex && optionIndex !== q.correct) {
                    opt.classList.add('incorrect');
                }
            });

            document.getElementById(`explanation-${questionIndex}`).classList.add('show');

            if (selectedAnswers[questionIndex] !== q.correct) {
                wrongAnswers.push({
                    index: questionIndex,
                    question: q.question,
                    yourAnswer: q.options[optionIndex],
                    correctAnswer: q.options[q.correct],
                    explanation: q.explanation
                });
            }

            if (answeredQuestions.size === chapter.quiz.length) {
                document.getElementById('finishQuizBtn').disabled = false;
            }
        }

                btn.textContent = '已复制';
                setTimeout(() => {
                    btn.textContent = '复制';
                }, 2000);
            }).catch(err => {
                console.error('复制失败:', err);
            });
        }
    </script>
